<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemoryLab - Patients</title>
<link rel="icon" type="image/png" href="/image/logo_memorylab_mark.png?v=2">
<link rel="shortcut icon" type="image/png" href="/image/logo_memorylab_mark.png?v=2">
<style>
  :root {
    --red:#BE0A1E; --navy:#1A2340; --navy-soft:#2C3658;
    --bg:#F4F5F7; --card:#FFFFFF; --border:#E2E4E9;
    --text:#1F2433; --text-soft:#6B7080; --text-faint:#9499A6;
    --accent-soft:#FBEBED; --good:#3B7D6E; --good-soft:#EAF2F0;
    --watch:#C77B30; --watch-soft:#FBF1E3;
    --shadow:0 1px 3px rgba(26,35,64,0.06),0 1px 2px rgba(26,35,64,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .topbar{background:var(--navy);color:#fff;height:56px;display:flex;align-items:center;padding:0 28px;gap:32px;}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.2px;cursor:pointer;}
  .logo-mark{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-mark img{display:block;width:100%;height:100%;object-fit:contain;}
  .logo span{color:#B9BECE;font-weight:400;}
  .nav{display:flex;gap:4px;margin-left:12px;}
  .nav a{color:#B9BECE;text-decoration:none;padding:7px 14px;border-radius:6px;font-size:13px;transition:background .15s,color .15s;}
  .nav a:hover{color:#fff;background:var(--navy-soft);}
  .nav a.active{color:#fff;background:var(--navy-soft);font-weight:600;}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:18px;}
  .clinician-badge{display:flex;align-items:center;gap:9px;font-size:13px;}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
  .clinician-badge .meta{line-height:1.25;}
  .clinician-badge .meta .name{font-weight:600;}
  .clinician-badge .meta .role{color:#B9BECE;font-size:11.5px;}
  .page{max-width:1180px;margin:0 auto;padding:28px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;}
  h1{font-size:28px;font-weight:700;color:var(--navy);letter-spacing:-.3px;}
  .subhead{font-size:13px;color:var(--text-soft);margin-top:2px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;}
  .toolbar{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .search{position:relative;flex:1;min-width:260px;}
  .search input{width:100%;height:38px;border:1px solid var(--border);border-radius:7px;background:#fff;padding:0 13px 0 36px;font-size:13.5px;color:var(--text);outline:none;}
  .search input:focus{border-color:#B8C0D0;box-shadow:0 0 0 3px rgba(74,111,165,.10);}
  .search .icon{position:absolute;left:13px;top:9px;color:var(--text-faint);font-size:13px;}
  .filter-dropdown{position:relative;flex-shrink:0;}
  .filter-button{min-width:190px;height:38px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--navy);border:1px solid var(--navy);color:#fff;border-radius:7px;padding:0 12px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s;}
  .filter-button:hover,.filter-button:focus-visible,.filter-dropdown.open .filter-button{background:var(--navy-soft);border-color:var(--navy-soft);box-shadow:0 0 0 3px rgba(26,35,64,.16);outline:none;}
  .filter-caret{font-size:10px;color:#fff;transition:transform .15s;}
  .filter-dropdown.open .filter-caret{transform:rotate(180deg);}
  .filter-menu{display:none;position:absolute;z-index:40;top:calc(100% + 6px);right:0;min-width:220px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:5px;box-shadow:0 10px 28px rgba(26,35,64,.16);}
  .filter-dropdown.open .filter-menu{display:block;}
  .filter-option{width:100%;border:0;background:transparent;color:var(--text);border-radius:6px;padding:9px 10px;display:flex;align-items:center;justify-content:space-between;gap:16px;font:inherit;font-size:12.5px;font-weight:600;text-align:left;cursor:pointer;}
  .filter-option:hover,.filter-option:focus-visible{background:var(--bg);outline:none;}
  .filter-option.active{background:#EEF1F6;color:var(--navy);}
  .filter-check{width:14px;color:var(--navy);font-weight:800;text-align:center;}
  table{width:100%;border-collapse:collapse;}
  th{height:38px;background:#FAFAFB;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.45px;color:var(--text-soft);text-align:left;font-weight:700;padding:0 16px;}
  td{border-bottom:1px solid var(--border);padding:13px 16px;vertical-align:middle;}
  tr.patient-row{cursor:pointer;transition:background .12s;}
  tr.patient-row:hover{background:#FAFAFB;}
  .patient-cell{display:flex;align-items:center;gap:11px;}
  .patient-initials{width:36px;height:36px;border-radius:9px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .p-name{font-weight:700;color:var(--navy);}
  .p-meta{font-size:12px;color:var(--text-soft);margin-top:1px;}
  .score-main{font-weight:800;color:var(--navy);font-size:17px;}
  .score-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px;}
  .trend{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;border-radius:999px;padding:4px 9px;}
  .trend.declining{background:var(--accent-soft);color:var(--red);}
  .trend.stable{background:var(--good-soft);color:var(--good);}
  .trend.new{background:#EEF0F6;color:var(--navy-soft);}
  .badges{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;font-size:11.5px;font-weight:700;border-radius:999px;padding:4px 8px;background:#EEF0F6;color:var(--navy-soft);white-space:nowrap;}
  .badge.filterable{cursor:pointer;border:1px solid transparent;transition:transform .12s,border-color .12s,box-shadow .12s;}
  .badge.filterable:hover{transform:translateY(-1px);border-color:currentColor;box-shadow:0 2px 8px rgba(26,35,64,.08);}
  .badge.review,.badge.quality{background:var(--accent-soft);color:var(--red);}
  .badge.due,.badge.new-session{background:var(--watch-soft);color:var(--watch);}
  .badge.new{background:#EEF0F6;color:var(--navy-soft);}
  .actions{display:flex;gap:7px;justify-content:flex-end;}
  .btn-sm{border:1px solid var(--border);background:#fff;color:var(--text-soft);border-radius:7px;padding:7px 10px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .btn-sm:hover{border-color:#C9CED8;color:var(--navy);}
  .btn-sm.primary{background:var(--navy);border-color:var(--navy);color:#fff;}
  .btn-sm.primary:hover{background:var(--navy-soft);}
  .empty-state{display:none;padding:36px 20px;text-align:center;color:var(--text-soft);font-size:13px;}
  .count-note{font-size:12.5px;color:var(--text-soft);padding:12px 18px;border-top:1px solid var(--border);background:#FAFAFB;}
  @media(max-width:860px){
    .page{padding:20px;}
    .page-head{align-items:flex-start;flex-direction:column;gap:6px;}
    .toolbar{align-items:stretch;flex-direction:column;}
    .search{min-width:0;}
    .filter-button{width:100%;}
    .filter-menu{left:0;right:0;min-width:0;}
    table,thead,tbody,tr,th,td{display:block;}
    thead{display:none;}
    tr.patient-row{padding:12px 14px;border-bottom:1px solid var(--border);}
    td{border-bottom:none;padding:5px 0;}
    .actions{justify-content:flex-start;margin-top:6px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="window.location.href='dashboard.html'" role="link" tabindex="0" onkeydown="if(event.key==='Enter') window.location.href='dashboard.html'"><div class="logo-mark"><img src="image/logo_memorylab_mark.png" alt="" aria-hidden="true"></div>MemoryLab <span>&nbsp;Clinical</span></div>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="patients.html" class="active">Patients</a>
    <a href="schedule.html">Schedule</a>
  </nav>
  <div class="topbar-right">
    <div class="clinician-badge">
      <div class="avatar">EV</div>
      <div class="meta"><div class="name">Dr. E. Visser</div><div class="role">General Practitioner</div></div>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-head">
    <div>
      <h1>Patients</h1>
      <div class="subhead">Clinical directory for active memory check-in patients</div>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="search">
        <span class="icon">&#8981;</span>
        <input id="patientSearch" type="search" placeholder="Search by name or flags">
      </div>
      <div class="filter-dropdown" id="patientFilter">
          <button class="filter-button" id="patientFilterButton" type="button" aria-haspopup="listbox" aria-expanded="false" aria-controls="patientFilterMenu">
          <span id="patientFilterLabel">Filter: All</span><span class="filter-caret" aria-hidden="true">&#9660;</span>
        </button>
        <div class="filter-menu" id="patientFilterMenu" role="listbox" aria-label="Filter patients">
          <button class="filter-option active" type="button" role="option" aria-selected="true" data-filter="all"><span>All</span><span class="filter-check">&#10003;</span></button>
          <button class="filter-option" type="button" role="option" aria-selected="false" data-filter="review"><span>Needs review</span><span class="filter-check"></span></button>
          <button class="filter-option" type="button" role="option" aria-selected="false" data-filter="new-session"><span>New session</span><span class="filter-check"></span></button>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Patient</th>
          <th>Latest score</th>
          <th>Trend</th>
          <th>Flags</th>
          <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="patientsTable"></tbody>
    </table>
    <div class="empty-state" id="emptyState">No patients match the current search and filter.</div>
    <div class="count-note" id="countNote"></div>
  </div>
</div>

<script src="data/schema.js"></script>
<script src="data/patients.js"></script>
<script src="data/sessions.js"></script>
<script src="data/events.js"></script>
<script src="data/notes.js"></script>
<script src="data/index.js"></script>
<script src="ui/helpers.js"></script>
<script>
const ML = window.MemoryLabData;
const UI = window.MemoryLabUI;
let activeFilter = 'all';
let searchTerm = '';

function trendLabel(patient) {
  const trend = ML.patientClinicalSummary(patient.id).trend;
  return UI.trendHtml(trend, { compact: true });
}

function searchableLabels(patient) {
  const summary = ML.patientClinicalSummary(patient.id);
  const labels = [summary.trend];
  if (summary.needsReview) labels.push('needs review');
  if (summary.newSession) labels.push('new session session completed completed at home');
  summary.badges.forEach(badge => labels.push(badge.label));
  return labels.join(' ');
}

function matchesFilter(patient) {
  const summary = ML.patientClinicalSummary(patient.id);
  if (activeFilter === 'review') return summary.needsReview;
  if (activeFilter === 'new-session') return summary.newSession;
  return true;
}

function matchesSearch(patient) {
  if (!searchTerm) return true;
  const edu = ML.educationFor(patient.educationCode);
  const haystack = [
    patient.name,
    patient.initials,
    edu.label,
    edu.fullLabel,
    ML.patientClinicalSummary(patient.id).trend,
    searchableLabels(patient),
  ].join(' ').toLowerCase();
  return haystack.includes(searchTerm);
}

function renderPatients() {
  const rows = ML.patients.filter(patient => matchesFilter(patient) && matchesSearch(patient));
  const tbody = document.getElementById('patientsTable');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('countNote');

  tbody.innerHTML = rows.map(patient => {
    const latest = ML.latestSession(patient);
    const edu = ML.educationFor(patient.educationCode);
    const sgma = Math.round(ML.sofToSGMA(latest.sof));

    return `
      <tr class="patient-row" onclick="window.location.href='${UI.patientProfileUrl(patient)}'">
        <td>
          <div class="patient-cell">
            <div class="patient-initials">${patient.initials}</div>
            <div>
              <div class="p-name">${patient.name}</div>
              <div class="p-meta">${patient.age} yrs &middot; ${edu.fullLabel}</div>
            </div>
          </div>
        </td>
        <td>
          <div class="score-main">${sgma}</div>
          <div class="score-sub">Latest: ${latest.date}</div>
        </td>
        <td>${trendLabel(patient)}</td>
        <td><div class="badges">${UI.patientBadgesHtml(ML.patientClinicalSummary(patient.id).badges.map(badge => ['review', 'new-session'].includes(badge.filter) ? badge : { ...badge, filter: null }), { emptyLabel: 'No active flags' })}</div></td>
        <td>
          <div class="actions" onclick="event.stopPropagation()">
            <button class="btn-sm primary" onclick="window.location.href='${UI.patientProfileUrl(patient)}'">Open profile</button>
            <button class="btn-sm" onclick="window.location.href='${UI.scheduleUrl(patient)}'">Schedule</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  empty.style.display = rows.length ? 'none' : 'block';
  count.textContent = rows.length + ' of ' + ML.patients.length + ' patients shown';
}

function setActiveFilter(filter) {
  activeFilter = ['review', 'new-session'].includes(filter) ? filter : 'all';
  updateFilterDropdown();
  setFilterOpen(false);
  renderPatients();
}

function setFilterOpen(open) {
  const dropdown = document.getElementById('patientFilter');
  const button = document.getElementById('patientFilterButton');
  if (!dropdown || !button) return;
  dropdown.classList.toggle('open', open);
  button.setAttribute('aria-expanded', String(open));
}

function updateFilterDropdown() {
  const labels = { all: 'All', review: 'Needs review', 'new-session': 'New session' };
  document.getElementById('patientFilterLabel').textContent = 'Filter: ' + labels[activeFilter];
  document.querySelectorAll('#patientFilter .filter-option').forEach(option => {
    const active = option.dataset.filter === activeFilter;
    option.classList.toggle('active', active);
    option.setAttribute('aria-selected', String(active));
    option.querySelector('.filter-check').innerHTML = active ? '&#10003;' : '';
  });
}

document.getElementById('patientSearch').addEventListener('input', event => {
  searchTerm = event.target.value.trim().toLowerCase();
  renderPatients();
});

document.getElementById('patientFilterButton').addEventListener('click', event => {
  event.stopPropagation();
  const dropdown = document.getElementById('patientFilter');
  setFilterOpen(!dropdown.classList.contains('open'));
});

document.getElementById('patientFilter').addEventListener('click', event => {
  const option = event.target.closest('.filter-option');
  if (!option) return;
  setActiveFilter(option.dataset.filter);
});

document.addEventListener('click', event => {
  if (!event.target.closest('#patientFilter')) setFilterOpen(false);
});

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') setFilterOpen(false);
});

document.getElementById('patientsTable').addEventListener('click', event => {
  const badge = event.target.closest('.badge.filterable');
  if (!badge) return;
  event.preventDefault();
  event.stopPropagation();
  setActiveFilter(badge.dataset.filter);
}, true);

document.getElementById('patientsTable').addEventListener('keydown', event => {
  const badge = event.target.closest('.badge.filterable');
  if (!badge || (event.key !== 'Enter' && event.key !== ' ')) return;
  event.preventDefault();
  event.stopPropagation();
  setActiveFilter(badge.dataset.filter);
});

renderPatients();
</script>
</body>
</html>
